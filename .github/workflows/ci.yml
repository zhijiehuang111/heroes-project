name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Type Check
        run: npm run type:check

      - name: Test
        run: npm run test -- --run

      - name: Build
        run: npm run build

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Wake up Heroku API
        run: curl -m 30 -s "https://hahow-recruit.herokuapp.com/heroes" > /dev/null || echo "API wakeup finished"

      - name: E2E Test
        run: npm run test:e2e
